name: CI

on:
  push:
    branches: [main, master, production-round3-2026-07-10]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build library and run tests
        run: make && make test
      - name: Build and run examples
        run: make examples
